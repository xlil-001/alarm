name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt update
        sudo apt install -y python3-pip git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev cmake libffi-dev libssl-dev \
          libc6-i386 lib32z1 lib32stdc++6
        # 安装系统级的 Android build-tools（提供 aidl 等）
        sudo apt install -y google-android-build-tools-34-installer || true
        # 升级 buildozer 到最新版（修复了 aidl 路径问题）
        pip3 install --upgrade Cython buildozer

    - name: Debug file list
      run: |
        echo "=== Project files ==="
        ls -la
        echo "=== Buildozer spec check ==="
        if [ -f buildozer.spec ]; then echo "buildozer.spec exists"; else echo "MISSING buildozer.spec"; fi

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: alarm-apk
        path: bin/*.apk
